<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#050a12" />
    <meta name="description" content="ProfitSols - Software Development Company In Islamabad, Pakistan" />
    <title>ProfitSols - Software Development Company</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      // GitHub Pages SPA routing: restore route from 404 redirect (?p=...)
      (function () {
        var params = new URLSearchParams(window.location.search);
        var p = params.get("p");
        if (!p) return;
        params.delete("p");
        var rest = params.toString();
        var newUrl = window.location.pathname.replace(/\/$/, "") + p + (rest ? ("?" + rest) : "") + window.location.hash;
        window.history.replaceState(null, "", newUrl);
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
